name: Java CI with Gradle

# Trigger workflow when code is pushed or PR is created to main branch
on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # Step 1: Download repository code into GitHub runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Install Java
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'   # Recommended Java distribution
          java-version: '8'

      # Step 3: Give execute permission to Gradle wrapper
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Step 4: Build application
      - name: Build with Gradle
        run: ./gradlew build

      # Step 5: Build and Push Docker image
      - name: Build and Push Docker Image
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          image: kingsleychino/demo-app
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          tags: latest
